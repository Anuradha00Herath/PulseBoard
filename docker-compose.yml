name: pulseboard

services:
  # ------------------------------------------------------------------
  # Infra
  # ------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: pulseboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulseboard
      POSTGRES_PASSWORD: pulseboard
      POSTGRES_DB: pulseboard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pulseboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    container_name: pulseboard-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: pulseboard-kraft-cluster-1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ------------------------------------------------------------------
  # Application services (Sprint 0: minimal health-check skeletons)
  # ------------------------------------------------------------------
  auth-service:
    build: ./services/auth-service
    container_name: pulseboard-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      DATABASE_URL: postgres://pulseboard:pulseboard@postgres:5432/pulseboard
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion-service:
    build: ./services/ingestion-service
    container_name: pulseboard-ingestion-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      PORT: 4002
      KAFKA_BROKER: kafka:9092
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:4001
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started

  aggregation-service:
    build: ./services/aggregation-service
    container_name: pulseboard-aggregation-service
    restart: unless-stopped
    environment:
      KAFKA_BROKER: kafka:9092
      DATABASE_URL: postgres://pulseboard:pulseboard@postgres:5432/pulseboard
      REDIS_URL: redis://redis:6379
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws-gateway:
    build: ./services/ws-gateway
    container_name: pulseboard-ws-gateway
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      PORT: 4003
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: pulseboard-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - ingestion-service
      - ws-gateway

volumes:
  pg_data:
